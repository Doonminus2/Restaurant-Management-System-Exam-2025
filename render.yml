services:
  - type: web
    name: rms-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # Set in Render dashboard
      - key: JWT_SECRET
        sync: false # Set in Render dashboard
      - key: CORS_ORIGIN
        sync: false # Set to your Vercel frontend URL
    healthCheckPath: /api/health